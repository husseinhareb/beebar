# beebar config — pill-grouped top bar (Catppuccin Mocha, waybar-style)

[bar.top]
height = 50
background = "#00000000"        # fully transparent bar surface; only pills show
foreground = "#cdd6f4"
font = "JetBrainsMono Nerd Font"
font_size = 13.5
padding_left = 8.0
padding_right = 8.0
position = "top"

# ── Pill styling ──────────────────────────────────────────────────────────────
# Vertical inset of pills from the bar edges, horizontal gap between pills,
# and the shared rounded background color (~80% opacity dark, like waybar).
margin_top      = 10.0
margin_bottom   = 6.0
margin_left     = 10.0
margin_right    = 10.0
group_spacing   = 10.0
corner_radius   = 6.0
module_background = "#1e1e2ecc"

# ── Pill groups (each inner array = one continuous pill) ──────────────────────
# Clock and workspaces are now in separate pills, matching the waybar
# screenshot. Add or rearrange entries to redesign the bar.
groups_left = [
    ["clock"],
    ["workspaces"],
]
groups_center = [
    ["window"],
]
groups_right = [
    ["network", "bluetooth"],
    ["temperature", "battery"],
    ["tray"],
]

# ── Workspaces ────────────────────────────────────────────────────────────────
# `empty_color` is brightened from #45475a → #585b70 so inactive workspaces are
# visible against the dark pill background.

[module.workspaces]
type = "workspaces"
count = 10
labels = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]
active_color   = "#cba6f7"
occupied_color = "#a6adc8"
empty_color    = "#585b70"

# ── Clock (mint-green, matches waybar #clock) ─────────────────────────────────

[module.clock]
type = "clock"
format = "  %I:%M %p   %a, %b %e"
foreground = "#00d483"

# ── Window (centre pill, shows the active window title) ──────────────────────
# `backend` selects where the title comes from:
#   - "beewm"     — read /tmp/beewm_window (beewm writes the focused title here)
#   - "hyprland"  — `hyprctl activewindow -j`
#   - "auto"      — prefer /tmp/beewm_window when present, fall back to hyprctl

[module.window]
type = "window"
backend = "auto"
max_length = 80
empty_label = ""
foreground = "#cdd6f4"

# ── Playback (kept available; not in the default layout) ──────────────────────

[module.playback]
type = "playback"
format = "{icon} {track}  {buttons}"
foreground = "#cdd6f4"

# ── Network (blue, like waybar #network) ──────────────────────────────────────

[module.network]
type = "network"
format = "󰇚 {download}  󰕒 {upload}"
foreground = "#0099ff"

# ── Bluetooth (blue, like waybar #bluetooth) ──────────────────────────────────

[module.bluetooth]
type = "bluetooth"
format = "{icon} {status}"
icon_on            = "󰂯"
icon_off           = "󰂲"
icon_no_controller = "󰂲"
foreground = "#0062ff"

# ── CPU ───────────────────────────────────────────────────────────────────────

[module.cpu]
type = "cpu"
icon = ""
foreground = "#89dceb"

# ── Temperature (teal, with warn/critical highlights) ─────────────────────────

[module.temperature]
type = "temperature"
icon = ""
warn_threshold     = 75.0
critical_threshold = 90.0
warn_color     = "#f9e2af"
critical_color = "#f38ba8"
foreground = "#94e2d5"

# ── Memory (kept for users who want it; not in the default pill layout) ───────

[module.memory]
type = "memory"
format = "󰍛 {used}/{total}"

# ── Brightness ────────────────────────────────────────────────────────────────
# `backend = "sysfs"` reads /sys/class/backlight/<device>/ directly so no
# brightnessctl install is required. Setting writes to that file (may need
# udev rules for non-root write access).

[module.brightness]
type = "brightness"
backend = "sysfs"
device  = "nvidia_0"
slider_width = 14
icon_gap     = 1
filled_color      = "#f9e2af"
empty_color       = "#45475a"
unavailable_color = "#6c7086"
icon_low         = "󰃚"
icon_medium      = "󰃝"
icon_high        = "󰃠"
icon_unknown     = ""
icon_unavailable = "󰃞"
glyph_left   = ""
glyph_filled = "█"
glyph_empty  = "░"
glyph_right  = ""
foreground = "#f9e2af"

# ── Volume (green, like waybar #pulseaudio) ───────────────────────────────────

[module.volume]
type = "volume"
slider_width = 14
icon_gap     = 1
filled_color      = "#a6e3a1"
empty_color       = "#45475a"
muted_color       = "#f38ba8"
unavailable_color = "#6c7086"
icon_muted       = "󰝟"
icon_unknown     = ""
icon_low         = "󰕿"
icon_medium      = "󰖀"
icon_high        = "󰕾"
icon_unavailable = "󰖁"
glyph_left   = ""
glyph_filled = "█"
glyph_empty  = "░"
glyph_right  = ""
foreground = "#679df5"

# ── Battery (green, like waybar #battery) ─────────────────────────────────────

[module.battery]
type = "battery"
icon_low    = "󰁻"
icon_medium = "󰁾"
icon_high   = "󰂁"
icon_full   = "󰁹"
foreground = "#3acc2d"

# ── System Tray ───────────────────────────────────────────────────────────────

[module.tray]
type = "tray"
icon_size     = 18
padding_left  = 8.0
padding_right = 8.0
icon_spacing  = 8.0
