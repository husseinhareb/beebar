# beebar config — single elegant top bar (Catppuccin Mocha)

[bar.top]
height = 36
background = "#11111b"
foreground = "#cdd6f4"
font = "JetBrainsMono Nerd Font"
font_size = 13.5
padding_left = 12.0
padding_right = 12.0
text_y_offset = 0.0
position = "top"

modules_left   = ["workspaces"]
modules_center = ["clock"]
modules_right  = ["playback", "network", "temperature", "cpu", "memory", "brightness", "volume", "battery", "tray"]

# ── Workspaces ────────────────────────────────────────────────────────────────

[module.workspaces]
type = "workspaces"
count = 9
labels = ["一", "二", "三", "四", "五", "六", "七", "八", "九"]
active_color   = "#cba6f7"
occupied_color = "#89b4fa"
empty_color    = "#45475a"

# ── Clock ─────────────────────────────────────────────────────────────────────

[module.clock]
type = "clock"
format = "  %A, %B %d   %H:%M"

# ── Playback ──────────────────────────────────────────────────────────────────

[module.playback]
type = "playback"
format = "{icon} {track}  {buttons}"

# ── Network ───────────────────────────────────────────────────────────────────

[module.network]
type = "network"
format = "󰇚 {download}  󰕒 {upload}"

# ── Temperature ───────────────────────────────────────────────────────────────

[module.temperature]
type = "temperature"
icon = ""
warn_threshold     = 75.0
critical_threshold = 90.0
warn_color     = "#f9e2af"
critical_color = "#f38ba8"

# ── CPU ───────────────────────────────────────────────────────────────────────

[module.cpu]
type = "cpu"
icon = ""

# ── Memory ────────────────────────────────────────────────────────────────────

[module.memory]
type = "memory"
format = "󰍛 {used}/{total}"

# ── Brightness ────────────────────────────────────────────────────────────────

[module.brightness]
type = "brightness"
slider_width = 14
icon_gap     = 1
filled_color      = "#f9e2af"
empty_color       = "#45475a"
unavailable_color = "#6c7086"
icon_low         = "󰃚"
icon_medium      = "󰃝"
icon_high        = "󰃠"
icon_unknown     = ""
icon_unavailable = "󰃞"
glyph_left   = ""
glyph_filled = "█"
glyph_empty  = "░"
glyph_right  = ""

# ── Volume ────────────────────────────────────────────────────────────────────

[module.volume]
type = "volume"
slider_width = 14
icon_gap     = 1
filled_color      = "#a6e3a1"
empty_color       = "#45475a"
muted_color       = "#f38ba8"
unavailable_color = "#6c7086"
icon_muted       = "󰝟"
icon_unknown     = ""
icon_low         = "󰕿"
icon_medium      = "󰖀"
icon_high        = "󰕾"
icon_unavailable = "󰖁"
glyph_left   = ""
glyph_filled = "█"
glyph_empty  = "░"
glyph_right  = ""

# ── Battery ───────────────────────────────────────────────────────────────────

[module.battery]
type = "battery"
icon_low    = "󰁻"
icon_medium = "󰁾"
icon_high   = "󰂁"
icon_full   = "󰁹"

# ── System Tray ───────────────────────────────────────────────────────────────

[module.tray]
type = "tray"
icon_size     = 16
padding_left  = 6.0
padding_right = 6.0
icon_spacing  = 6.0
