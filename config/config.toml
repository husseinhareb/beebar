# beebar config вЂ” pill-grouped top bar (Catppuccin Mocha, waybar-style)

[bar.top]
height = 50
background = "#00000000"        # fully transparent bar surface; only pills show
foreground = "#cdd6f4"
font = "JetBrainsMono Nerd Font"
font_size = 13.5
bold = true                      # render all text at Pango Weight::Bold
padding_left = 8.0
padding_right = 8.0
position = "top"

# в”Ђв”Ђ Refresh rate в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# How often (in milliseconds) modules are polled and the bar is redrawn.
# Lower values feel more responsive; higher values reduce CPU usage.
# refresh_interval_ms = 200   # default: 200 ms (5 Hz)

# в”Ђв”Ђ Pill styling в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Vertical inset of pills from the bar edges, horizontal gap between pills,
# and the shared rounded background color (~80% opacity dark, like waybar).
margin_top      = 10.0
margin_bottom   = 6.0
margin_left     = 10.0
margin_right    = 10.0
group_spacing   = 10.0
corner_radius   = 6.0
module_background = "#1e1e2ecc"

# в”Ђв”Ђ Pill groups (each inner array = one continuous pill) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
groups_left = [
    ["clock"],
    ["workspaces"],
]
groups_center = [
    ["window"],
]
groups_right = [
    ["network", "bluetooth"],
    ["temperature", "battery"],
    ["brightness", "volume", "microphone"],
    ["tray"],
]

# в”Ђв”Ђ Workspaces в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.workspaces]
type = "workspaces"
count = 10
labels = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]
active_color   = "#cba6f7"
occupied_color = "#a6adc8"
empty_color    = "#585b70"

# в”Ђв”Ђ Clock (mint-green, matches waybar #clock) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# `` U+F017 = nf-fa-clock, `` U+F073 = nf-fa-calendar.

[module.clock]
type = "clock"
# у°Ґ” = nf-md-clock-time-eight, у°ѓ­ = nf-md-calendar
format = "у°Ґ” %I:%M %p   у°ѓ­ %a, %b %e"
foreground = "#00d483"

# в”Ђв”Ђ Window (centre pill, shows the active window title) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# `backend` selects where the title comes from:
#   - "beewm"     вЂ” read /tmp/beewm_window (beewm writes the focused title here)
#   - "hyprland"  вЂ” `hyprctl activewindow -j`
#   - "auto"      вЂ” prefer /tmp/beewm_window when present, fall back to hyprctl

[module.window]
type = "window"
backend = "auto"
max_length = 80
empty_label = ""
foreground = "#cdd6f4"

# в”Ђв”Ђ Playback (kept available; not in the default layout) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.playback]
type = "playback"
format = "{icon} {track}  {buttons}"
foreground = "#cdd6f4"
# Playback control button icons (defaults shown):
# icon_previous = "у°’®"
# icon_stop     = "у°“›"
# icon_play     = "у°ђЉ"
# icon_pause    = "у°Џ¤"
# icon_next     = "у°’­"

# в”Ђв”Ђ Network (blue, like waybar #network) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.network]
type = "network"
format = "у°‡љ {download}  у°•’ {upload}"
foreground = "#0099ff"

# в”Ђв”Ђ Bluetooth (blue, like waybar #bluetooth) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.bluetooth]
type = "bluetooth"
format = "{icon} {status}"
icon_on            = "у°‚Ї"
icon_off           = "у°‚І"
icon_no_controller = "у°‚І"
foreground = "#0062ff"
# poll_interval_ms = 2000   # default: 2000 ms

# в”Ђв”Ђ CPU в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.cpu]
type = "cpu"
icon = "у°Ќ›"            # у°Ќ› = nf-md-memory (waybar uses the same idea for cpu)
foreground = "#89dceb"

# в”Ђв”Ђ Temperature (teal, with warn/critical highlights) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.temperature]
type = "temperature"
icon = "у°”Џ"            # у°”Џ = nf-md-thermometer
warn_threshold     = 75.0
critical_threshold = 90.0
warn_color     = "#f9e2af"
critical_color = "#f38ba8"
foreground = "#94e2d5"

# в”Ђв”Ђ Memory (kept for users who want it; not in the default pill layout) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.memory]
type = "memory"
format = "у°Ќ› {used}/{total}"

# в”Ђв”Ђ Brightness в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Compact form (no slider): renders as `<icon> <pct>%` вЂ” matches waybar.

[module.brightness]
type = "brightness"
backend = "sysfs"
device  = "nvidia_0"
show_slider = false
icon_low    = "у°ѓљ"
icon_medium = "у°ѓќ"
icon_high   = "у°ѓ "
icon_unknown     = ""
icon_unavailable = "у°ѓћ"
foreground = "#f9e2af"

# в”Ђв”Ђ Volume (output / speakers) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.volume]
type = "volume"
target = "sink"
show_slider = false
icon_muted       = "у°ќџ"
icon_unknown     = ""
icon_low         = "у°•ї"
icon_medium      = "у°–Ђ"
icon_high        = "у°•ѕ"
icon_unavailable = "у°–Ѓ"
muted_color       = "#f38ba8"
unavailable_color = "#6c7086"
foreground = "#679df5"

# в”Ђв”Ђ Microphone (input / source вЂ” second instance of the volume module) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.microphone]
type = "volume"
target = "source"
show_slider = false
# у°Ќ¬ = nf-md-microphone, у°Ќ­ = nf-md-microphone-off, у°Ќі = nf-md-microphone-question
icon_muted       = "у°Ќ­"
icon_unknown     = "у°Ќі"
icon_low         = "у°Ќ¬"
icon_medium      = "у°Ќ¬"
icon_high        = "у°Ќ¬"
icon_unavailable = "у°Ќ­"
muted_color       = "#f38ba8"
unavailable_color = "#6c7086"
foreground = "#bb84ff"

# в”Ђв”Ђ Battery (green, like waybar #battery) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.battery]
type = "battery"
icon_low    = "у°Ѓ»"
icon_medium = "у°Ѓѕ"
icon_high   = "у°‚Ѓ"
icon_full   = "у°Ѓ№"
foreground = "#3acc2d"

# в”Ђв”Ђ System Tray в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[module.tray]
type = "tray"
icon_size     = 18
padding_left  = 8.0
padding_right = 8.0
icon_spacing  = 8.0
