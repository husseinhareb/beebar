# beebar config вҖ” pill-grouped top bar (Catppuccin Mocha, waybar-style)

[bar.top]
height = 50
background = "#00000000"        # fully transparent bar surface; only pills show
foreground = "#cdd6f4"
font = "JetBrainsMono Nerd Font"
font_size = 13.5
bold = true                      # render all text at Pango Weight::Bold
padding_left = 8.0
padding_right = 8.0
position = "top"

# в”Җв”Җ Refresh rate в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# How often (in milliseconds) modules are polled and the bar is redrawn.
# Lower values feel more responsive; higher values reduce CPU usage.
# refresh_interval_ms = 200   # default: 200 ms (5 Hz)

# в”Җв”Җ Pill styling в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Vertical inset of pills from the bar edges, horizontal gap between pills,
# and the shared rounded background color (~80% opacity dark, like waybar).
margin_top      = 10.0
margin_bottom   = 6.0
margin_left     = 10.0
margin_right    = 10.0
group_spacing   = 10.0
corner_radius   = 6.0
module_background = "#1e1e2ecc"

# в”Җв”Җ Pill groups (each inner array = one continuous pill) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
groups_left = [
    ["clock"],
    ["workspaces"],
]
groups_center = [
    ["window"],
]
groups_right = [
    ["network", "bluetooth"],
    ["temperature", "battery"],
    ["brightness", "volume", "microphone"],
    ["tray"],
]

# в”Җв”Җ Workspaces в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.workspaces]
type = "workspaces"
refresh_interval_ms = 100        # tight polling for snappy focus tracking
count = 10
labels = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]
active_color   = "#cba6f7"
occupied_color = "#a6adc8"
empty_color    = "#585b70"

# в”Җв”Җ Clock (mint-green, matches waybar #clock) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# `` U+F017 = nf-fa-clock, `` U+F073 = nf-fa-calendar.

[module.clock]
type = "clock"
refresh_interval_ms = 1000
# у°Ҙ” = nf-md-clock-time-eight, у°ғӯ = nf-md-calendar
format = "у°Ҙ” %I:%M %p   у°ғӯ %a, %b %e"
foreground = "#00d483"

# в”Җв”Җ Window (centre pill, shows the active window title) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# `backend` selects where the title comes from:
#   - "beewm"     вҖ” read /tmp/beewm_window (beewm writes the focused title here)
#   - "hyprland"  вҖ” `hyprctl activewindow -j`
#   - "auto"      вҖ” prefer /tmp/beewm_window when present, fall back to hyprctl

[module.window]
type = "window"
refresh_interval_ms = 100        # tight polling вҖ” feels instant on focus changes
backend = "auto"
max_length = 80
empty_label = ""
foreground = "#cdd6f4"

# в”Җв”Җ Playback (kept available; not in the default layout) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.playback]
type = "playback"
refresh_interval_ms = 1000
format = "{icon} {track}  {buttons}"
foreground = "#cdd6f4"
# Playback control button icons (defaults shown):
# icon_previous = "у°’®"
# icon_stop     = "у°“ӣ"
# icon_play     = "у°җҠ"
# icon_pause    = "у°ҸӨ"
# icon_next     = "у°’ӯ"

# в”Җв”Җ Network (blue, like waybar #network) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.network]
type = "network"
refresh_interval_ms = 1000
format = "у°Үҡ {download}  у°•’ {upload}"
foreground = "#0099ff"

# в”Җв”Җ Bluetooth (blue, like waybar #bluetooth) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.bluetooth]
type = "bluetooth"
refresh_interval_ms = 1000       # update() is a no-op; this just paces redraws
format = "{icon} {status}"
icon_on            = "у°ӮҜ"
icon_off           = "у°ӮІ"
icon_no_controller = "у°ӮІ"
foreground = "#0062ff"
# poll_interval_ms = 2000   # default: 2000 ms

# в”Җв”Җ CPU в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.cpu]
type = "cpu"
refresh_interval_ms = 1000
icon = "у°Қӣ"            # у°Қӣ = nf-md-memory (waybar uses the same idea for cpu)
foreground = "#89dceb"

# в”Җв”Җ Temperature (teal, with warn/critical highlights) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.temperature]
type = "temperature"
refresh_interval_ms = 1000
icon = "у°”Ҹ"            # у°”Ҹ = nf-md-thermometer
warn_threshold     = 75.0
critical_threshold = 90.0
warn_color     = "#f9e2af"
critical_color = "#f38ba8"
foreground = "#94e2d5"

# в”Җв”Җ Memory (kept for users who want it; not in the default pill layout) в”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.memory]
type = "memory"
refresh_interval_ms = 1000
format = "у°Қӣ {used}/{total}"

# в”Җв”Җ Brightness в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Compact form (no slider): renders as `<icon> <pct>%` вҖ” matches waybar.

[module.brightness]
type = "brightness"
refresh_interval_ms = 1000
backend = "sysfs"
device  = "nvidia_0"
show_slider = false
icon_low    = "у°ғҡ"
icon_medium = "у°ғқ"
icon_high   = "у°ғ "
icon_unknown     = ""
icon_unavailable = "у°ғһ"
foreground = "#f9e2af"

# в”Җв”Җ Volume (output / speakers) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.volume]
type = "volume"
refresh_interval_ms = 1000
target = "sink"
show_slider = false
icon_muted       = "у°қҹ"
icon_unknown     = ""
icon_low         = "у°•ҝ"
icon_medium      = "у°–Җ"
icon_high        = "у°•ҫ"
icon_unavailable = "у°–Ғ"
muted_color       = "#f38ba8"
unavailable_color = "#6c7086"
foreground = "#679df5"

# в”Җв”Җ Microphone (input / source вҖ” second instance of the volume module) в”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.microphone]
type = "volume"
refresh_interval_ms = 1000
target = "source"
show_slider = false
# у°Қ¬ = nf-md-microphone, у°Қӯ = nf-md-microphone-off, у°Қі = nf-md-microphone-question
icon_muted       = "у°Қӯ"
icon_unknown     = "у°Қі"
icon_low         = "у°Қ¬"
icon_medium      = "у°Қ¬"
icon_high        = "у°Қ¬"
icon_unavailable = "у°Қӯ"
muted_color       = "#f38ba8"
unavailable_color = "#6c7086"
foreground = "#bb84ff"

# в”Җв”Җ Battery (green, like waybar #battery) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.battery]
type = "battery"
refresh_interval_ms = 1000
icon_low    = "у°Ғ»"
icon_medium = "у°Ғҫ"
icon_high   = "у°ӮҒ"
icon_full   = "у°Ғ№"
foreground = "#3acc2d"

# в”Җв”Җ System Tray в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[module.tray]
type = "tray"
refresh_interval_ms = 1000       # cache poll cadence; signals push immediately
icon_size     = 18
padding_left  = 8.0
padding_right = 8.0
icon_spacing  = 8.0
